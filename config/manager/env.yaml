apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
            - name: SPEAKER_IMAGE
              value: "quay.io/metallb/speaker:main"
            - name: CONTROLLER_IMAGE
              value: "quay.io/metallb/controller:main"
            - name: METALLB_BGP_TYPE
              value: "native"
            - name: FRR_IMAGE
              value: "quay.io/frrouting/frr:9.1.0"
            - name: TLS_CIPHER_SUITES
              value: ""
            - name: TLS_CURVE_PREFERENCES
              value: ""
            - name: TLS_MIN_VERSION
              value: ""
            - name: FRRK8S_IMAGE
              value: "quay.io/metallb/frr-k8s:v0.0.23"
            - name: FRRK8S_EXTERNAL_NAMESPACE
              value: "frr-k8s-system"
